<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель: Отели</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 30px 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #2c3e50;
      font-size: 2.2rem;
    }
    .home-button,
    .add-button {
      display: inline-block;
      margin: 10px 10px 20px 0;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      color: #fff;
    }
    .home-button {
      background: #3b82f6;
    }
    .home-button:hover {
      background: #2563eb;
    }
    .add-button {
      background: #10b981;
    }
    .add-button:hover {
      background: #059669;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fdfdfd;
      border-radius: 8px;
      overflow: hidden;
    }
    thead {
      background: #e2e8f0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      color: #2c3e50;
    }
    th {
      font-weight: 600;
    }
    tbody tr:hover {
      background: #f1f5f9;
    }
    .action-buttons a {
      display: inline-block;
      margin-right: 8px;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
    }
    .edit-btn {
      background: #3b82f6;
    }
    .edit-btn:hover {
      background: #2563eb;
    }
    .delete-btn {
      background: #ef4444;
    }
    .delete-btn:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Админ-панель: Отели</h1>

  <a th:href="@{/}" class="home-button">← На главную</a>
  <a th:href="@{/admin/hotels/new}" class="add-button">Добавить отель</a>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Название</th>
      <th>Город</th>
      <th>Рейтинг</th>
      <th>Номера</th>
      <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${hotels}">
      <td th:text="${h.id}">1</td>
      <td th:text="${h.name}">Гранд Отель</td>
      <td th:text="${h.city}">Москва</td>
      <td th:text="${h.rating}">4.5</td>
      <td th:text="${#lists.size(h.rooms)}">0</td>
      <td class="action-buttons">
        <a th:href="@{'/admin/hotels/edit/' + ${h.id}}" class="edit-btn">Изменить</a>
        <a th:href="@{'/admin/hotels/delete/' + ${h.id}}"
           class="delete-btn"
           onclick="return confirm('Удалить отель и все его номера?')">Удалить</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
