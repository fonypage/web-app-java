<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${hotel.id != null} ? 'Редактирование отеля' : 'Создание отеля'">Форма отеля</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #333333;
        }
        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            padding: 30px 40px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 1.8rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd6e0;
            border-radius: 6px;
            background: #fdfdfd;
            font-size: 1rem;
        }
        button {
            align-self: center;
            padding: 10px 25px;
            background-color: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #2563eb;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: #3b82f6;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .rooms-section {
            margin-top: 20px;
        }
        .rooms-section h3 {
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fdfdfd;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 8px;
            border: 1px solid #e5e7eb;
            text-align: left;
        }
        th {
            background: #e2e8f0;
        }
        .room-actions a {
            margin-right: 8px;
            text-decoration: none;
            color: #3b82f6;
            font-size: 0.9rem;
        }
        .add-room-button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            background: #10b981;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .add-room-button:hover {
            background: #059669;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 th:text="${hotel.id != null} ? 'Редактировать отель' : 'Добавить новый отель'">Форма отеля</h2>

    <form th:action="@{/admin/hotels/save}" th:object="${hotel}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div>
            <label for="name">Название отеля</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Введите название" required/>
        </div>

        <div>
            <label for="city">Город</label>
            <input type="text" id="city" th:field="*{city}" placeholder="Москва, Санкт-Петербург..." required/>
        </div>

        <div>
            <label for="rating">Рейтинг (например, 4.5)</label>
            <input type="text" id="rating" th:field="*{rating}" placeholder="4.5"/>
        </div>

        <div>
            <label for="imageUrl">Ссылка на изображение</label>
            <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="URL картинки отеля"/>
        </div>

        <div>
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{description}" rows="4"
                      placeholder="Краткое описание отеля"></textarea>
        </div>

        <button type="submit">Сохранить отель</button>
    </form>

    <a th:href="@{/admin/dashboard}" class="back-link">← Назад в список отелей</a>

    <div class="rooms-section" th:if="${hotel.id != null}">
        <h3>Номера отеля</h3>

        <table th:if="${rooms != null}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Вместимость</th>
                <th>Цена за ночь</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rooms}">
                <td th:text="${r.id}">1</td>
                <td th:text="${r.title}">Стандарт</td>
                <td th:text="${r.capacity}">2</td>
                <td th:text="${r.pricePerNight}">4500</td>
                <td class="room-actions">
                    <a th:href="@{'/admin/rooms/edit/' + ${r.id}}">Изменить</a>
                    <a th:href="@{'/admin/rooms/delete/' + ${r.id}}"
                       onclick="return confirm('Удалить номер?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>

        <a th:href="@{'/admin/hotels/' + ${hotel.id} + '/rooms/new'}" class="add-room-button">
            + Добавить номер
        </a>
    </div>
</div>
</body>
</html>
