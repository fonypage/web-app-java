<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход пользователя • Java Learning</title>
    <style>
        :root {
            --bg0:#060814;
            --bg1:#0a0f2a;
            --panel: rgba(255,255,255,.06);
            --panel2: rgba(255,255,255,.04);
            --border: rgba(255,255,255,.14);
            --text: #e8ecff;
            --muted: rgba(232,236,255,.70);
            --a: #5c63ff;
            --b: #22c55e;
            --c: #f59e0b;
            --p: #a855f7;
            --r: #ef4444;
            --shadow: 0 22px 70px rgba(0,0,0,.55);
            --shadow2: 0 12px 34px rgba(0,0,0,.35);
            --radius: 22px;
        }

        * {box-sizing:border-box; margin:0; padding:0;}
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:
            radial-gradient(1200px 700px at 10% 10%, rgba(92,99,255,.22), transparent 60%),
            radial-gradient(900px 520px at 90% 20%, rgba(168,85,247,.20), transparent 60%),
            radial-gradient(1000px 600px at 65% 85%, rgba(34,197,94,.16), transparent 60%),
            linear-gradient(180deg, var(--bg0), var(--bg1));
            overflow:hidden;
            padding:24px;
        }

        .fx {
            position:fixed; inset:0; pointer-events:none; z-index:-1;
        }
        .fx::before {
            content:"";
            position:absolute; inset:0;
            background:
            linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size:52px 52px;
            opacity:.18;
            mask-image: radial-gradient(600px 400px at 50% 20%, #000 40%, transparent 75%);
            transform:perspective(900px) rotateX(55deg) translateY(-120px);
            filter:blur(.2px);
        }

        .card {
            width:min(420px,92vw);
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            backdrop-filter:blur(18px);
            padding:28px;
            position:relative;
            overflow:hidden;
        }

        .card::before {
            content:"";
            position:absolute; inset:-2px;
            background:conic-gradient(
            from 180deg,
            rgba(92,99,255,.28),
            rgba(168,85,247,.22),
            rgba(34,197,94,.20),
            rgba(245,158,11,.18),
            rgba(92,99,255,.28)
            );
            filter:blur(22px);
            opacity:.45;
            animation:spin 10s linear infinite;
        }
        @keyframes spin {to{transform:rotate(360deg);} }

        .brand {
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:18px;
        }
        .logo {
            width:42px; height:42px;
            border-radius:16px;
            background:linear-gradient(135deg, var(--a), var(--p));
            display:flex; align-items:center; justify-content:center;
            font-weight:950;
            color:#fff;
            box-shadow:0 14px 28px rgba(92,99,255,.25);
        }
        .title {
            font-weight:950; letter-spacing:-0.3px; line-height:1.1;
        }
        .subtitle {
            font-size:12px; color:var(--muted);
        }

        .headline {
            margin:12px 0 8px;
            font-size:22px;
            font-weight:980;
            letter-spacing:-0.5px;
        }
        .desc {
            color:var(--muted);
            font-size:14px;
            line-height:1.6;
            margin-bottom:16px;
        }

        form {display:flex; flex-direction:column; gap:14px;}

        .field {
            position:relative;
            padding:12px;
            border-radius:18px;
            border:1px solid rgba(255,255,255,.12);
            background:rgba(0,0,0,.14);
        }
        .field label {
            display:block;
            font-size:12px;
            font-weight:850;
            color:rgba(232,236,255,.75);
            margin-bottom:8px;
        }
        .field input {
            width:100%;
            border:none;
            outline:none;
            background:transparent;
            color:var(--text);
            font-size:15px;
            padding-right:36px;
        }
        .field input::placeholder {color:rgba(232,236,255,.45);}
        .icon {
            position:absolute;
            right:14px;
            top:50%;
            transform:translateY(6px);
            width:20px;
            opacity:.75;
            filter:drop-shadow(0 0 10px rgba(92,99,255,.35));
        }

        /* МЯГКАЯ кнопка входа */
        .submit {
            margin-top:4px;
            width:100%;
            border:1px solid rgba(255,255,255,.20);
            border-radius:16px;
            padding:14px 16px;
            cursor:pointer;
            font-weight:950;
            color:var(--text);
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(14px);
            box-shadow:var(--shadow2);
            transition:all .2s ease;
        }
        .submit:hover {
            border-color:rgba(92,99,255,.40);
            background:rgba(92,99,255,.12);
            transform:translateY(-1px);
            box-shadow:0 18px 44px rgba(92,99,255,.22);
        }

        .note {
            margin-top:14px;
            font-size:12px;
            color:var(--muted);
            background:rgba(0,0,0,.10);
            border:1px solid rgba(255,255,255,.08);
            padding:10px 12px;
            border-radius:16px;
            text-align:center;
        }

        @media (max-width: 420px){
            .brand{ flex-direction:column; align-items:flex-start; text-align:left; }
        }
    </style>
</head>
<body>
<div class="fx"></div>

<div class="card">
    <div class="brand">
        <div class="logo">J</div>
        <div>
            <div class="title">Java Learning</div>
            <div class="subtitle">Пользовательский доступ</div>
        </div>
    </div>

    <div class="headline">Вход в систему</div>
    <div class="desc">Введите свои учётные данные, чтобы продолжить обучение и доступ к материалам.</div>

    <form th:action="@{/login-user}" method="post">
        <div class="field">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" placeholder="Ваш логин" required>
        </div>

        <div class="field">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Ваш пароль" required>
        </div>

        <button class="submit" type="submit">Войти</button>
    </form>

    <div class="note">Доступ только для пользователя (user/user)</div>
</div>
</body>
</html>
