<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title th:text="${room.title} + ' — HotelBooking'">Номер — HotelBooking</title>
  <style>
    :root {
      --primary: #2f80ed;
      --primary-dark: #1c64d9;
      --accent: #f2994a;
      --bg: #f5f7fb;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }
    .navbar-logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--primary-dark);
      text-decoration: none;
    }
    .navbar-logo span { color: var(--accent); }
    .navbar-links a {
      margin-left: 16px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
    }
    .navbar-links a:hover { color: var(--primary-dark); }

    .page {
      max-width: 900px;
      margin: 24px auto 40px;
      padding: 0 20px;
    }

    .breadcrumb {
      font-size: 13px;
      margin-bottom: 12px;
      color: var(--text-muted);
    }
    .breadcrumb a {
      color: var(--primary-dark);
      text-decoration: none;
    }
    .breadcrumb a:hover { text-decoration: underline; }

    .room-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }
    .room-top {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
    }
    .room-image {
      min-height: 220px;
      background-size: cover;
      background-position: center;
    }
    .room-info {
      padding: 18px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .room-title {
      font-size: 22px;
      font-weight: 700;
    }
    .room-hotel {
      font-size: 14px;
      color: var(--text-muted);
    }
    .room-hotel a {
      color: var(--primary-dark);
      text-decoration: none;
    }
    .room-hotel a:hover { text-decoration: underline; }

    .room-meta {
      font-size: 14px;
      color: var(--text-muted);
    }
    .room-price {
      font-size: 16px;
      font-weight: 600;
      margin-top: 4px;
    }
    .room-description {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-main);
    }

    .room-actions {
      margin-top: 14px;
    }
    .btn {
      border-radius: 999px;
      border: none;
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    @media (max-width: 800px) {
      .room-top {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header class="navbar">
  <a th:href="@{/}" class="navbar-logo">
    Hotel<span>Booking</span>
  </a>
  <nav class="navbar-links">
    <a th:href="@{/admin/dashboard}">Админ-панель</a>
  </nav>
</header>

<main class="page">
  <div class="breadcrumb">
    <a th:href="@{/hotels}">Отели</a>
    <span> / </span>
    <a th:href="@{'/hotel/' + ${room.hotel.id}}" th:text="${room.hotel.name}">Отель</a>
    <span> / </span>
    <span th:text="${room.title}">Номер</span>
  </div>

  <section class="room-card">
    <div class="room-top">
      <div class="room-image"
           th:style="'background-image:url(' + (${room.imageUrl} != null ? ${room.imageUrl} : 'https://images.pexels.com/photos/271639/pexels-photo-271639.jpeg?auto=compress&cs=tinysrgb&w=1200') + ');'">
      </div>
      <div class="room-info">
        <div class="room-title" th:text="${room.title}">Номер</div>

        <div class="room-hotel">
          Отель:
          <a th:href="@{'/hotel/' + ${room.hotel.id}}" th:text="${room.hotel.name}">Название отеля</a>
        </div>

        <div class="room-meta">
          Вместимость:
          <span th:text="${room.capacity}">2</span>
          гостя
        </div>

        <div class="room-price">
          <span th:text="${room.pricePerNight}">4500</span> ₽ / ночь
        </div>

        <div class="room-description" th:text="${room.description}">
          Описание номера...
        </div>

        <div class="room-actions">
          <a th:href="@{'/booking/' + ${room.id}}" class="btn btn-primary">
            Забронировать этот номер
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

</body>
</html>
