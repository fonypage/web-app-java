<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Код подтверждения • Java Learning</title>
    <style>
        :root{
            --bg0:#060814; --bg1:#0a0f2a;
            --panel: rgba(255,255,255,.06);
            --border: rgba(255,255,255,.14);
            --text: #e8ecff;
            --muted: rgba(232,236,255,.70);
            --a:#5c63ff; --p:#a855f7; --r:#ef4444; --g:#22c55e;
            --shadow: 0 22px 70px rgba(0,0,0,.55);
            --shadow2: 0 12px 34px rgba(0,0,0,.35);
            --radius: 22px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color:var(--text);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            overflow:hidden;
            background:
            radial-gradient(1200px 700px at 10% 10%, rgba(92,99,255,.22), transparent 60%),
            radial-gradient(900px 520px at 90% 20%, rgba(168,85,247,.20), transparent 60%),
            linear-gradient(180deg, var(--bg0), var(--bg1));
        }
        .card{
            width:min(520px, 92vw);
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            backdrop-filter: blur(18px);
            padding:28px;
            position:relative;
            overflow:hidden;
        }
        .card::before{
            content:'';position:absolute;inset:-2px;
            background: conic-gradient(from 180deg,
            rgba(92,99,255,.28), rgba(168,85,247,.22), rgba(92,99,255,.28));
            filter: blur(22px);
            opacity:.45;
            animation: spin 10s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        .card > *{position:relative;z-index:1;}

        .top{
            display:flex;align-items:center;justify-content:space-between;
            gap:12px;margin-bottom:14px;
        }
        .pill{
            display:inline-flex;align-items:center;gap:8px;
            padding:10px 14px;border-radius:999px;
            border:1px solid rgba(255,255,255,.14);
            background:rgba(0,0,0,.22);
            color:var(--text);text-decoration:none;font-weight:850;
            transition: transform .15s ease, background .2s ease, border-color .2s ease;
            white-space:nowrap;
        }
        .pill:hover{transform:translateY(-1px); background:rgba(0,0,0,.30); border-color:rgba(255,255,255,.22);}

        .headline{margin:6px 0 6px; font-size:22px; font-weight:980; letter-spacing:-.5px;}
        .desc{color:var(--muted); font-size:14px; line-height:1.65; margin-bottom:14px;}
        .email{
            display:inline-flex;align-items:center;gap:8px;
            padding:8px 12px;border-radius:999px;
            border:1px solid rgba(255,255,255,.14);
            background: rgba(0,0,0,.12);
            font-weight:850;
            margin-bottom:12px;
        }

        .alert{
            margin-bottom:12px;
            padding:10px 12px;
            border-radius:16px;
            border:1px solid rgba(239,68,68,.35);
            background: rgba(239,68,68,.10);
            font-size:13px;
        }
        .info{
            border-color: rgba(92,99,255,.35);
            background: rgba(92,99,255,.10);
        }
        .ok{
            border-color: rgba(34,197,94,.35);
            background: rgba(34,197,94,.10);
        }

        /* OTP inputs */
        .otp-wrap{display:flex; gap:10px; justify-content:center; margin: 12px 0 6px;}
        .otp{
            width: 52px; height: 56px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.14);
            color: var(--text);
            font-size: 22px;
            font-weight: 950;
            text-align:center;
            outline:none;
            transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
        }
        .otp:focus{
            border-color: rgba(92,99,255,.55);
            box-shadow: 0 0 0 3px rgba(92,99,255,.18);
            transform: translateY(-1px);
        }

        .submit{
            margin-top:10px;
            width:100%; border:none;
            border-radius:16px;
            padding:14px 16px;
            cursor:pointer;
            font-weight:950;
            color:#fff;
            background: linear-gradient(135deg, rgba(92,99,255,1), rgba(168,85,247,1));
            box-shadow: 0 22px 58px rgba(92,99,255,.22);
            transition: transform .15s ease, box-shadow .2s ease, opacity .2s ease;
        }
        .submit:hover{transform:translateY(-1px); box-shadow:0 26px 70px rgba(92,99,255,.26); opacity:.98;}

        .secondary{
            width:100%;
            margin-top:10px;
            border-radius:16px;
            padding:14px 16px;
            cursor:pointer;
            font-weight:950;
            color:var(--text);
            border:1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.06);
            box-shadow: var(--shadow2);
            transition: transform .15s ease, background .2s ease, border-color .2s ease;
        }
        .secondary:hover{
            transform: translateY(-1px);
            border-color: rgba(92,99,255,.35);
            background: rgba(92,99,255,.10);
        }
        .secondary:disabled{
            opacity:.55;
            cursor:not-allowed;
            transform:none;
        }

        .hint{margin-top:12px; font-size:12px; color:rgba(232,236,255,.65); line-height:1.5; text-align:center;}

        /* hidden real input */
        #code{position:absolute; left:-9999px; width:1px; height:1px; opacity:0;}
    </style>
</head>
<body>

<div class="card">
    <div class="top">
        <div></div>
        <a th:href="@{/login-user}" class="pill">Изменить email</a>
    </div>

    <div class="headline">Введите код</div>
    <div class="desc">Мы отправили 6-значный код на почту:</div>
    <div class="email">📩 <span th:text="${email}">email</span></div>

    <div class="alert" th:if="${error}" th:text="${error}"></div>
    <div class="alert info" th:if="${info}" th:text="${info}"></div>
    <div class="alert ok" th:if="${success}" th:text="${success}"></div>

    <!-- Основная форма проверки -->
    <form th:action="@{/auth/email/verify}" method="post" id="verifyForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${email}"/>

        <!-- скрытый input, куда собираем код -->
        <input id="code" name="code" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>

        <div class="otp-wrap" id="otpWrap">
            <input class="otp" inputmode="numeric" maxlength="1" />
            <input class="otp" inputmode="numeric" maxlength="1" />
            <input class="otp" inputmode="numeric" maxlength="1" />
            <input class="otp" inputmode="numeric" maxlength="1" />
            <input class="otp" inputmode="numeric" maxlength="1" />
            <input class="otp" inputmode="numeric" maxlength="1" />
        </div>

        <button class="submit" type="submit">Войти</button>
    </form>

    <!-- Повторная отправка -->
    <form th:action="@{/auth/email/request}" method="post" id="resendForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${email}"/>
        <button id="resendBtn" class="secondary" type="submit" disabled>Отправить ещё раз (30)</button>
    </form>

    <div class="hint">
        Если письмо не пришло — проверь “Спам”.<br>
        Повторная отправка доступна через 30 секунд.
    </div>
</div>

<script>
    (function(){
        const inputs = Array.from(document.querySelectorAll('.otp'));
        const hidden = document.getElementById('code');
        const wrap = document.getElementById('otpWrap');

        function syncHidden(){
            hidden.value = inputs.map(i => i.value || '').join('').slice(0,6);
        }

        // только цифры
        function digitOnly(v){ return (v || '').replace(/\D/g,'').slice(0,1); }

        inputs.forEach((inp, idx) => {
            inp.addEventListener('input', (e) => {
                const v = digitOnly(inp.value);
                inp.value = v;
                if (v && idx < inputs.length - 1) inputs[idx+1].focus();
                syncHidden();
                if (hidden.value.length === 6) {
                    // можно автосабмитить, но лучше оставить кнопку
                }
            });

            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && idx > 0) {
                    inputs[idx-1].focus();
                }
            });

            inp.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = (e.clipboardData || window.clipboardData).getData('text');
                const digits = (text || '').replace(/\D/g,'').slice(0,6).split('');
                for (let i=0;i<inputs.length;i++){
                    inputs[i].value = digits[i] || '';
                }
                syncHidden();
                const next = Math.min(digits.length, inputs.length-1);
                inputs[next].focus();
            });
        });

        // клик по области — фокус на первый пустой
        wrap.addEventListener('click', () => {
            const firstEmpty = inputs.find(i => !i.value) || inputs[inputs.length-1];
            firstEmpty.focus();
        });

        // autofocus
        setTimeout(() => inputs[0].focus(), 50);

        // resend timer
        const btn = document.getElementById('resendBtn');
        let left = 30;
        const tick = () => {
            if (!btn) return;
            if (left <= 0) {
                btn.disabled = false;
                btn.textContent = 'Отправить ещё раз';
                return;
            }
            btn.textContent = `Отправить ещё раз (${left})`;
            left--;
            setTimeout(tick, 1000);
        };
        tick();

        // перед сабмитом синхронизируем hidden
        document.getElementById('verifyForm').addEventListener('submit', () => syncHidden());
    })();
</script>
</body>
</html>
