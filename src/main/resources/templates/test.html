<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Пройти тест</title>
  <style>
    :root {
      --bg0:#060814;
      --bg1:#0a0f2a;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.14);
      --text: #e8ecff;
      --muted: rgba(232,236,255,.70);

      --a: #5c63ff;
      --b: #22c55e;
      --p: #a855f7;
      --r: #ef4444;

      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --shadow2: 0 12px 34px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
      radial-gradient(1200px 700px at 10% 10%, rgba(92,99,255,.22), transparent 60%),
      radial-gradient(900px 520px at 90% 20%, rgba(168,85,247,.20), transparent 60%),
      radial-gradient(1000px 600px at 65% 85%, rgba(34,197,94,.16), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x: hidden;
    }

    .fx {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }
    .fx::before {
      content: '';
      position: absolute; inset: 0;
      background:
      linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: .18;
      mask-image: radial-gradient(600px 400px at 50% 20%, #000 40%, transparent 75%);
      transform: perspective(900px) rotateX(55deg) translateY(-120px);
      filter: blur(.2px);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* Hero в стиле practice */
    .hero {
      background:
      linear-gradient(135deg, rgba(34,197,94,.70), rgba(92,99,255,.65)),
      url('/images/hero-practice.png') center/cover;
      position: relative;
      border-radius: var(--radius);
      padding: 60px 36px;
      text-align: center;
      margin-bottom: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: conic-gradient(from 180deg, rgba(255,255,255,.2), transparent);
      filter: blur(24px);
      animation: spin 15s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hero-inner { position: relative; z-index: 1; max-width: 760px; margin: auto; }
    .hero h1 {
      font-size: 38px;
      font-weight: 980;
      margin-bottom: 14px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,.85));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,.95);
      max-width: 650px;
      margin: 0 auto;
    }

    /* Карточка формы */
    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(16px);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .question {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
      animation: fadeInUp .5s ease both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-title {
      font-weight: 950;
      font-size: 16px;
      letter-spacing: -0.2px;
      margin-bottom: 12px;
      color: rgba(232,236,255,.95);
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    /* Радио — кликабельная плитка */
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
      user-select: none;
    }
    .opt:hover {
      transform: translateY(-1px);
      background: rgba(92,99,255,.08);
      border-color: rgba(92,99,255,.30);
    }

    .opt input[type="radio"] {
      margin-top: 3px;
      accent-color: var(--a);
      transform: scale(1.05);
    }

    .opt span {
      color: rgba(232,236,255,.82);
      line-height: 1.45;
      font-size: 14px;
    }

    /* Кнопка как в practice */
    .search-btn {
      margin-top: 6px;
      align-self: center;
      padding: 14px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: all .2s ease;
    }
    .search-btn:hover {
      border-color: rgba(92,99,255,.40);
      background: rgba(92,99,255,.12);
      transform: translateY(-1px);
      box-shadow: 0 20px 50px rgba(92,99,255,.18);
    }

    .hint {
      text-align: center;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 22px auto 0;
      padding: 14px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight: 950;
      text-decoration: none;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow2);
      transition: all .2s ease;
      justify-content: center;
      max-width: 220px;
    }
    .back-button:hover {
      border-color: rgba(92,99,255,.40);
      background: rgba(92,99,255,.10);
      transform: translateY(-1px);
      box-shadow: 0 20px 50px rgba(92,99,255,.20);
    }

    @media (max-width: 768px) {
      .hero { padding: 46px 22px; }
      .hero h1 { font-size: 32px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
<div class="fx"></div>

<div class="wrap">

  <section class="hero">
    <div class="hero-inner">
      <h1>Пройти тест</h1>
      <p>Выбери по одному ответу на каждый вопрос и отправь результат.</p>
    </div>
  </section>

  <div class="card">
    <form th:action="@{/test-result}" method="post">
      <input type="hidden" th:name="topicId" th:value="${topicId}" />

      <div th:each="question : ${questions}" class="question">
        <div class="q-title" th:text="${question.question}">Вопрос</div>

        <div class="answers" th:each="answer : ${question.answers}">
          <label class="opt">
            <input type="radio"
                   th:name="${'q_' + question.id}"
                   th:value="${answer.id}"
                   required />
            <span th:text="${answer.text}">Ответ</span>
          </label>
        </div>
      </div>

      <button class="search-btn" type="submit">Отправить</button>
      <div class="hint">После отправки увидишь разбор по каждому вопросу.</div>
    </form>

    <a th:href="@{/}" class="back-button">← Назад на главную</a>
  </div>

</div>
</body>
</html>
